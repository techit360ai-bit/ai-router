name: TECHIT — Test and Deploy

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:

  # ─────────────────────────────────────────
  # Run on every push and every PR
  # ─────────────────────────────────────────
  test:
    name: Smoke Test — AI Brain
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Brain smoke test
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          REDIS_URL:          ${{ secrets.REDIS_URL }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_KEY:         test-secret-key-ci-only
          ENVIRONMENT:        test
        run: |
          python3 -c "
          from ai_router_core import ScoringEngine, SubscriptionTier, SubscriptionAccessControl, TaskType
          from billing_system import ALL_PLANS, CREDIT_OPERATIONS
          from training_module import ModuleLibrary
          from database_schema import Base

          gsis = ScoringEngine.compute_gsis(70,65,60,55,40,72,50,35,80)
          assert 0 < gsis['gsis'] < 100, 'GSIS out of range'
          assert len(ALL_PLANS) == 11, f'Expected 11 plans, got {len(ALL_PLANS)}'
          assert len(ModuleLibrary.all_modules()) == 35, 'Module count mismatch'
          assert len(Base.metadata.tables) >= 30, 'Table count mismatch'
          print('✅ All smoke tests passed')
          "

  # ─────────────────────────────────────────
  # Deploy to staging — runs on push to staging
  # ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - name: Trigger Render staging deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}" \
            -o /dev/null -w "HTTP %{http_code}\n"
          echo "✅ Staging deploy triggered"

  # ─────────────────────────────────────────
  # Deploy to production — runs on push to main
  # ─────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render production deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}" \
            -o /dev/null -w "HTTP %{http_code}\n"
          echo "✅ Production deploy triggered"
