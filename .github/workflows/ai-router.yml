name: TECHIT AI Router

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - "docker-compose.yml"
      - "Dockerfile.*"
      - ".env.example"
      - "docs/**"
      - "scripts/**"
      - ".github/workflows/ai-router.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - "docker-compose.yml"
      - "Dockerfile.*"
      - ".env.example"
      - "docs/**"
      - "scripts/**"
      - ".github/workflows/ai-router.yml"

jobs:
  quality:
    name: AI Router Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run release gates
        run: python3 scripts/release_gate.py
