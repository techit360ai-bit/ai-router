
services:

  # ── Run migrations once before API starts ─────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: alembic upgrade head
    environment:
      - DATABASE_URL=postgresql://techit:${POSTGRES_PASSWORD}@postgres:5432/techit_db
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── FastAPI application ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://techit:${POSTGRES_PASSWORD}@postgres:5432/techit_db
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=techit-embeddings
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - JWT_SECRET=${JWT_SECRET:-${SECRET_KEY}}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOW_DEMO_AUTH=${ALLOW_DEMO_AUTH:-true}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - MCP_BASE_URL=${MCP_BASE_URL:-http://host.docker.internal:3000/api/mcp}
      - MCP_TIMEOUT=${MCP_TIMEOUT:-10}
      - SENTRY_DSN=${SENTRY_DSN}
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery worker — AI task execution ─────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: >
      celery -A workers.workers worker
      --loglevel=info
      --concurrency=4
      -Q default,ai_heavy,ai_light,scheduled
    environment:
      - DATABASE_URL=postgresql://techit:${POSTGRES_PASSWORD}@postgres:5432/techit_db
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER=redis://redis:6379
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./:/app

  # ── Celery Beat — 14 scheduled jobs ───────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A workers.workers beat --loglevel=info
    environment:
      - CELERY_BROKER=redis://redis:6379
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./:/app

  # ── Flower — Celery monitor ────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A workers.workers flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER=redis://redis:6379
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL 16 + pgvector ───────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=techit
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=techit_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techit"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
